<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilt Pattern Maker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            color: #2c5f4f;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #2c5f4f;
            background: #f0f7f4;
        }

        .upload-area.dragging {
            border-color: #2c5f4f;
            background: #e8f4ef;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c5f4f;
            font-size: 14px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2c5f4f;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2c5f4f;
            cursor: pointer;
            border: none;
        }

        .value-display {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            color: #2c5f4f;
            font-size: 18px;
        }

        .canvas-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .canvas-wrapper {
            text-align: center;
        }

        .canvas-wrapper h3 {
            margin-bottom: 10px;
            color: #2c5f4f;
            font-size: 16px;
        }

        canvas {
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }

        .palette {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .palette h3 {
            margin-bottom: 15px;
            color: #2c5f4f;
        }

        .color-swatches {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .color-swatch {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            border: 1px solid #ccc;
            flex-shrink: 0;
        }

        .color-info {
            font-size: 12px;
            line-height: 1.4;
        }

        .color-hex {
            font-weight: 600;
            font-family: monospace;
        }

        .color-percent {
            color: #666;
        }

        button {
            background: #2c5f4f;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background: #234a3d;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .canvas-container {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧵 Quilt Pattern Maker</h1>
        <p class="subtitle">Turn photos into simple applique patterns</p>

        <div class="upload-area" id="uploadArea">
            <p style="font-size: 18px; margin-bottom: 10px;">📸 Click or drag a photo here</p>
            <p style="color: #999; font-size: 14px;">JPEG or PNG files</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div id="controls" class="controls hidden">
            <div class="control-group">
                <label for="colorSlider">Number of Colors</label>
                <div class="slider-container">
                    <input type="range" id="colorSlider" min="3" max="12" value="6" step="1">
                    <span class="value-display" id="colorValue">6</span>
                </div>
            </div>

            <div class="control-group">
                <label for="detailSlider">Pattern Detail</label>
                <div class="slider-container">
                    <input type="range" id="detailSlider" min="50" max="200" value="100" step="10">
                    <span class="value-display" id="detailValue">100</span>
                </div>
            </div>
        </div>

        <div id="canvasContainer" class="canvas-container hidden">
            <div class="canvas-wrapper">
                <h3>Original Photo</h3>
                <canvas id="originalCanvas"></canvas>
            </div>
            <div class="canvas-wrapper">
                <h3>Quilt Pattern</h3>
                <canvas id="patternCanvas"></canvas>
            </div>
        </div>

        <div id="palette" class="palette hidden">
            <h3>Fabric Colors (<span id="paletteCount">0</span> colors)</h3>
            <div class="color-swatches" id="colorSwatches"></div>
        </div>

        <button id="downloadBtn" class="hidden">Download Pattern PDF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        let currentImage = null;
        let colorPalette = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const canvasContainer = document.getElementById('canvasContainer');
        const originalCanvas = document.getElementById('originalCanvas');
        const patternCanvas = document.getElementById('patternCanvas');
        const palette = document.getElementById('palette');
        const downloadBtn = document.getElementById('downloadBtn');
        const colorSlider = document.getElementById('colorSlider');
        const colorValue = document.getElementById('colorValue');
        const detailSlider = document.getElementById('detailSlider');
        const detailValue = document.getElementById('detailValue');

        // Upload area interactions
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // Slider updates
        colorSlider.addEventListener('input', (e) => {
            colorValue.textContent = e.target.value;
            if (currentImage) {
                processImage();
            }
        });

        detailSlider.addEventListener('input', (e) => {
            detailValue.textContent = e.target.value;
            if (currentImage) {
                processImage();
            }
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    controls.classList.remove('hidden');
                    canvasContainer.classList.remove('hidden');
                    palette.classList.remove('hidden');
                    downloadBtn.classList.remove('hidden');
                    processImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function processImage() {
            if (!currentImage) return;

            const numColors = parseInt(colorSlider.value);
            const detail = parseInt(detailSlider.value);

            // Calculate dimensions to maintain aspect ratio
            const maxWidth = 400;
            const scale = maxWidth / currentImage.width;
            const width = Math.floor(currentImage.width * scale);
            const height = Math.floor(currentImage.height * scale);

            // Draw original
            originalCanvas.width = width;
            originalCanvas.height = height;
            const origCtx = originalCanvas.getContext('2d');
            origCtx.drawImage(currentImage, 0, 0, width, height);

            // Process for pattern
            const patternWidth = Math.floor(width * (detail / 100));
            const patternHeight = Math.floor(height * (detail / 100));
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = patternWidth;
            tempCanvas.height = patternHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(currentImage, 0, 0, patternWidth, patternHeight);

            const imageData = tempCtx.getImageData(0, 0, patternWidth, patternHeight);
            const quantized = quantizeColors(imageData, numColors);

            patternCanvas.width = width;
            patternCanvas.height = height;
            const patternCtx = patternCanvas.getContext('2d');
            
            // Draw quantized image scaled back up
            const scaledCanvas = document.createElement('canvas');
            scaledCanvas.width = patternWidth;
            scaledCanvas.height = patternHeight;
            const scaledCtx = scaledCanvas.getContext('2d');
            scaledCtx.putImageData(quantized.imageData, 0, 0);
            
            patternCtx.imageSmoothingEnabled = false;
            patternCtx.drawImage(scaledCanvas, 0, 0, patternWidth, patternHeight, 0, 0, width, height);

            colorPalette = quantized.palette;
            displayPalette(quantized.palette);
        }

        function quantizeColors(imageData, numColors) {
            const pixels = [];
            for (let i = 0; i < imageData.data.length; i += 4) {
                pixels.push([
                    imageData.data[i],
                    imageData.data[i + 1],
                    imageData.data[i + 2]
                ]);
            }

            // K-means clustering
            let centroids = [];
            for (let i = 0; i < numColors; i++) {
                const idx = Math.floor(Math.random() * pixels.length);
                centroids.push([...pixels[idx]]);
            }

            for (let iter = 0; iter < 10; iter++) {
                const clusters = Array(numColors).fill().map(() => []);
                
                pixels.forEach(pixel => {
                    let minDist = Infinity;
                    let closestIdx = 0;
                    
                    centroids.forEach((centroid, idx) => {
                        const dist = colorDistance(pixel, centroid);
                        if (dist < minDist) {
                            minDist = dist;
                            closestIdx = idx;
                        }
                    });
                    
                    clusters[closestIdx].push(pixel);
                });

                centroids = clusters.map(cluster => {
                    if (cluster.length === 0) return centroids[0];
                    const sum = cluster.reduce((acc, pixel) => [
                        acc[0] + pixel[0],
                        acc[1] + pixel[1],
                        acc[2] + pixel[2]
                    ], [0, 0, 0]);
                    return [
                        Math.round(sum[0] / cluster.length),
                        Math.round(sum[1] / cluster.length),
                        Math.round(sum[2] / cluster.length)
                    ];
                });
            }

            // Count pixels per color
            const colorCounts = Array(numColors).fill(0);
            const newData = new Uint8ClampedArray(imageData.data.length);

            for (let i = 0; i < imageData.data.length; i += 4) {
                const pixel = [
                    imageData.data[i],
                    imageData.data[i + 1],
                    imageData.data[i + 2]
                ];

                let minDist = Infinity;
                let closestIdx = 0;
                
                centroids.forEach((centroid, idx) => {
                    const dist = colorDistance(pixel, centroid);
                    if (dist < minDist) {
                        minDist = dist;
                        closestIdx = idx;
                    }
                });

                colorCounts[closestIdx]++;
                newData[i] = centroids[closestIdx][0];
                newData[i + 1] = centroids[closestIdx][1];
                newData[i + 2] = centroids[closestIdx][2];
                newData[i + 3] = 255;
            }

            const totalPixels = pixels.length;
            const palette = centroids.map((color, idx) => ({
                rgb: color,
                hex: rgbToHex(color),
                percentage: ((colorCounts[idx] / totalPixels) * 100).toFixed(1)
            }));

            palette.sort((a, b) => b.percentage - a.percentage);

            return {
                imageData: new ImageData(newData, imageData.width, imageData.height),
                palette
            };
        }

        function colorDistance(c1, c2) {
            return Math.sqrt(
                Math.pow(c1[0] - c2[0], 2) +
                Math.pow(c1[1] - c2[1], 2) +
                Math.pow(c1[2] - c2[2], 2)
            );
        }

        function rgbToHex(rgb) {
            return '#' + rgb.map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        function displayPalette(palette) {
            document.getElementById('paletteCount').textContent = palette.length;
            const swatchesContainer = document.getElementById('colorSwatches');
            swatchesContainer.innerHTML = '';

            palette.forEach((color, idx) => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.innerHTML = `
                    <div class="color-box" style="background-color: ${color.hex}"></div>
                    <div class="color-info">
                        <div class="color-hex">${color.hex}</div>
                        <div class="color-percent">${color.percentage}% of pattern</div>
                    </div>
                `;
                swatchesContainer.appendChild(swatch);
            });
        }

        downloadBtn.addEventListener('click', async () => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'letter'
            });

            // Title
            pdf.setFontSize(20);
            pdf.setFont(undefined, 'bold');
            pdf.text('Quilt Applique Pattern', 15, 20);

            // Pattern image
            const patternDataUrl = patternCanvas.toDataURL('image/png');
            const imgWidth = 180;
            const imgHeight = (patternCanvas.height / patternCanvas.width) * imgWidth;
            pdf.addImage(patternDataUrl, 'PNG', 15, 30, imgWidth, imgHeight);

            let yPos = 30 + imgHeight + 15;

            // Color palette
            pdf.setFontSize(14);
            pdf.setFont(undefined, 'bold');
            pdf.text('Fabric Colors', 15, yPos);
            yPos += 10;

            pdf.setFontSize(10);
            pdf.setFont(undefined, 'normal');

            colorPalette.forEach((color, idx) => {
                // Color box
                pdf.setFillColor(color.rgb[0], color.rgb[1], color.rgb[2]);
                pdf.rect(15, yPos - 4, 8, 8, 'F');
                
                // Color info
                pdf.text(`${color.hex}  —  ${color.percentage}% of pattern`, 28, yPos);
                yPos += 10;

                if (yPos > 260) {
                    pdf.addPage();
                    yPos = 20;
                }
            });

            // Footer
            const pageCount = pdf.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                pdf.setPage(i);
                pdf.setFontSize(8);
                pdf.setTextColor(150);
                pdf.text(`Generated by Quilt Pattern Maker — Page ${i} of ${pageCount}`, 15, 270);
            }

            pdf.save('quilt-pattern.pdf');
        });
    </script>
</body>
</html>
